<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Boda Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&family=Nunito:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <main class="game-shell">
        <canvas
          id="game"
          width="960"
          height="380"
          aria-label="Juego runner de boda"
        ></canvas>
        <div class="score-hud" aria-live="polite">
          <strong id="distance">0</strong>
          <span id="best">R0</span>
        </div>
        <div id="overlay" class="overlay"></div>
      </main>
      <div class="rotate-hint">↻ Mejor en horizontal · gira el dispositivo</div>
      <footer class="help">
        <span>Teclado: Space / ArrowUp</span>
        <span>Móvil: toca en el área del juego</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
